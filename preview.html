<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Gallery</title>

<style>
  body {
    margin: 0;
    background: #ffffff;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
  }

  .gallery {
    width: 100%;
    max-width: 420px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .slider {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .slides {
    display: flex;
    height: 100%;
    transition: transform 0.4s ease;
  }

  .slides img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    flex-shrink: 0;
  }

  .thumbnails {
    display: flex;
    overflow-x: auto;
    padding: 8px;
    gap: 6px;
    background: #fff;
  }

  .thumbnails img {
    width: 60px;
    height: 80px;
    object-fit: cover;
    border-radius: 6px;
    opacity: 0.6;
    cursor: pointer;
  }

  .thumbnails img.active {
    opacity: 1;
    border: 2px solid #000;
  }
</style>
</head>

<body>

<div class="gallery">
  <div class="slider" id="slider">
    <div class="slides" id="slides"></div>
  </div>

  <div class="thumbnails" id="thumbnails"></div>
</div>

<script>
const images = [
"https://imgur.com/IKhvOn0.jpg",
"https://imgur.com/CvwzwFt.jpg",
"https://imgur.com/Szd06IQ.jpg",
"https://imgur.com/BzEHALo.jpg",
"https://imgur.com/aChtijm.jpg",
"https://imgur.com/T5B1NIk.jpg",
"https://imgur.com/QeWmNOj.jpg",
"https://imgur.com/FCI6vbK.jpg",
"https://imgur.com/tqHGr4O.jpg",
"https://imgur.com/dp76d7Q.jpg",
"https://imgur.com/gArQQcP.jpg",
"https://imgur.com/Crr0vD3.jpg",
"https://imgur.com/SqbUoNt.jpg",
"https://imgur.com/6D6m18O.jpg",
"https://imgur.com/xDchxFi.jpg",
"https://imgur.com/xuCXdck.jpg",
"https://imgur.com/DEC8ATx.jpg",
"https://imgur.com/ZBaD4za.jpg",
"https://imgur.com/BViNvwX.jpg",
"https://imgur.com/qDttvTj.jpg",
"https://imgur.com/gFQUuEv.jpg",
"https://imgur.com/yCYV3lc.jpg",
"https://imgur.com/ywzoB67.jpg",
"https://imgur.com/5tZC5qL.jpg",
"https://imgur.com/u9sYWjC.jpg",
"https://imgur.com/HAi8TUy.jpg"
];

// Fix Imgur direct links
const fixedImages = images.map(url => url.replace("imgur.com", "i.imgur.com"));

const slides = document.getElementById("slides");
const thumbnails = document.getElementById("thumbnails");

let currentIndex = 0;

// Create slides + thumbnails
fixedImages.forEach((src, index) => {
  const img = document.createElement("img");
  img.src = src;
  slides.appendChild(img);

  const thumb = document.createElement("img");
  thumb.src = src;
  thumb.onclick = () => goToSlide(index);
  thumbnails.appendChild(thumb);
});

function updateGallery() {
  slides.style.transform = `translateX(-${currentIndex * 100}%)`;

  document.querySelectorAll(".thumbnails img").forEach((thumb, i) => {
    thumb.classList.toggle("active", i === currentIndex);
  });
}

function goToSlide(index) {
  currentIndex = index;
  updateGallery();
}

// Swipe support
let startX = 0;

const slider = document.getElementById("slider");

slider.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

slider.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;
  handleSwipe(endX);
});

// Mouse drag (desktop)
slider.addEventListener("mousedown", e => {
  startX = e.clientX;
});

slider.addEventListener("mouseup", e => {
  handleSwipe(e.clientX);
});

function handleSwipe(endX) {
  let diff = startX - endX;

  if (diff > 50 && currentIndex < fixedImages.length - 1) {
    currentIndex++;
  } else if (diff < -50 && currentIndex > 0) {
    currentIndex--;
  }

  updateGallery();
}

// Init
updateGallery();
</script>

</body>
</html>
